<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - PlantCure AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Poppins',sans-serif; min-height:100vh;
    background:linear-gradient(135deg,#0f4c1e 0%,#1a7a3c 50%,#2ecc71 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .login-container {
    background:white; border-radius:30px;
    padding:60px 50px; width:450px;
    box-shadow:0 30px 80px rgba(0,0,0,0.3);
    text-align:center; animation:slideUp 0.6s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(50px)} to{opacity:1;transform:translateY(0)} }
  .logo { font-size:60px; margin-bottom:10px; }
  h1 { font-size:26px; font-weight:800; color:#1a7a3c; margin-bottom:5px; }
  .subtitle { color:#666; margin-bottom:30px; font-size:15px; }
  
  .google-btn {
    display:flex; align-items:center; justify-content:center; gap:12px;
    background:white; border:2px solid #e0e0e0;
    padding:16px 30px; border-radius:15px;
    font-size:16px; font-weight:600; cursor:pointer;
    width:100%; margin-bottom:15px;
    transition:all 0.3s; box-shadow:0 4px 15px rgba(0,0,0,0.08);
    font-family:'Poppins',sans-serif;
  }
  .google-btn:hover {
    border-color:#2ecc71;
    box-shadow:0 8px 25px rgba(46,204,113,0.2);
    transform:translateY(-2px);
  }
  .google-logo { width:24px; height:24px; }
  
  .divider { display:flex; align-items:center; gap:15px; margin:20px 0; color:#999; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:#e0e0e0; }
  
  .guest-btn {
    background:linear-gradient(135deg,#1a7a3c,#2ecc71);
    color:white; padding:16px 30px; border-radius:15px;
    font-size:16px; font-weight:600; text-decoration:none;
    display:block; transition:all 0.3s;
    box-shadow:0 8px 25px rgba(46,204,113,0.3);
    font-family:'Poppins',sans-serif; border:none; cursor:pointer; width:100%;
  }
  .guest-btn:hover { transform:translateY(-2px); box-shadow:0 15px 35px rgba(46,204,113,0.4); }
  
  .back-link { margin-top:25px; color:#999; font-size:14px; }
  .back-link a { color:#1a7a3c; text-decoration:none; font-weight:600; }
  
  .features-mini { display:flex; gap:15px; margin:20px 0; justify-content:center; }
  .feat { text-align:center; }
  .feat-icon { font-size:24px; }
  .feat-text { font-size:11px; color:#666; margin-top:5px; }

  .loading-msg { display:none; color:#1a7a3c; font-weight:600; margin-top:15px; }
  .error-msg { display:none; color:#cc0000; font-size:14px; margin-top:10px; }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">🌿</div>
  <h1>Welcome to PlantCure AI</h1>
  <p class="subtitle">Sign in to detect plant diseases instantly</p>

  <div class="features-mini">
    <div class="feat"><div class="feat-icon">🔬</div><div class="feat-text">AI Analysis</div></div>
    <div class="feat"><div class="feat-icon">💊</div><div class="feat-text">Solutions</div></div>
    <div class="feat"><div class="feat-icon">🌾</div><div class="feat-text">38 Diseases</div></div>
    <div class="feat"><div class="feat-icon">⚡</div><div class="feat-text">3 Seconds</div></div>
  </div>

  <!-- GOOGLE LOGIN BUTTON -->
  <button class="google-btn" onclick="googleLogin()">
    <svg class="google-logo" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <p class="loading-msg" id="loadingMsg">⏳ Signing in with Google...</p>
  <p class="error-msg" id="errorMsg"></p>

  <div class="divider">or</div>

  <button class="guest-btn" onclick="window.location.href='/guest_login'">
    👤 Continue as Guest
  </button>

  <div class="back-link">
    <p>← <a href="/">Back to Home</a></p>
  </div>
</div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  // ⚠️ உங்க Firebase Config இங்க போடு
  const firebaseConfig = {
    apiKey: "AIzaSyAXDgFl19SsHUKmgyR2l77sBKPvF5MilQk",
    authDomain: "plantcure-ai.firebaseapp.com",
    projectId: "plantcure-ai",
    storageBucket: "plantcure-ai.firebasestorage.app",
    messagingSenderId: "161308453955",
    appId: "1:161308453955:web:5bbceab0adc3fb536238f6"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.googleLogin = async function() {
    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      
      // Flask backend-க்கு user info அனுப்பு
      const response = await fetch('/google_login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: user.displayName,
          email: user.email,
          photo: user.photoURL,
          uid: user.uid
        })
      });
      
      const data = await response.json();
      if (data.success) {
        window.location.href = '/dashboard';
      }
    } catch (error) {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = '❌ Login failed: ' + error.message;
    }
  }
</script>
</body>
</html>
