<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌿 PlantCure AI - Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  width:100%;
  background:linear-gradient(135deg,#0a2e14 0%,#1a5c30 50%,#2ecc71 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  margin:0;
}
.leaf{
  position:fixed;
  font-size:40px;
  opacity:0.08;
  animation:float 8s ease-in-out infinite;
  pointer-events:none;
}
.l1{top:5%;left:5%;animation-delay:0s;}
.l2{top:15%;right:8%;animation-delay:2s;}
.l3{bottom:20%;left:3%;animation-delay:4s;}
.l4{bottom:10%;right:5%;animation-delay:6s;}
.l5{top:45%;left:50%;animation-delay:3s;}
.l6{top:70%;right:20%;animation-delay:1s;}
@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-20px) rotate(15deg);}
}
.wrapper{
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  background:white;
  border-radius:30px;
  padding:45px 35px;
  width:100%;
  max-width:440px;
  box-shadow:0 40px 100px rgba(0,0,0,0.4);
  text-align:center;
  position:relative;
  z-index:10;
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:6px;
  background:linear-gradient(90deg,#1a5c30,#2ecc71,#a8ff78);
  border-radius:30px 30px 0 0;
}
.logo-wrap{
  width:80px;height:80px;
  border-radius:25px;
  background:linear-gradient(135deg,#1a5c30,#2ecc71);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
  margin:0 auto 20px;
  box-shadow:0 10px 30px rgba(46,204,113,0.4);
}
.brand{font-size:28px;font-weight:800;color:#1a5c30;margin-bottom:5px;}
.subtitle{color:#999;font-size:14px;margin-bottom:30px;line-height:1.5;}
.features{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:30px;
}
.feat{
  background:#f8fff8;
  border-radius:15px;
  padding:12px 5px;
  border:1px solid #e0f5e9;
  transition:all 0.3s;
}
.feat:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(46,204,113,0.2);}
.feat-icon{font-size:24px;margin-bottom:5px;}
.feat-label{font-size:10px;color:#666;font-weight:600;}
.btn-google{
  width:100%;
  padding:16px 20px;
  border-radius:15px;
  border:2px solid #e8e8e8;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
  color:#333;
  transition:all 0.3s;
  font-family:'Poppins',sans-serif;
  box-shadow:0 4px 15px rgba(0,0,0,0.06);
}
.btn-google:hover{
  border-color:#4285F4;
  box-shadow:0 8px 25px rgba(66,133,244,0.2);
  transform:translateY(-2px);
}
.google-svg{width:22px;height:22px;flex-shrink:0;}
.divider{
  display:flex;align-items:center;gap:12px;
  margin:18px 0;color:#ccc;font-size:13px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,#ddd,transparent);
}
.btn-guest{
  width:100%;
  padding:16px 20px;
  border-radius:15px;
  border:none;
  background:linear-gradient(135deg,#1a5c30,#2ecc71);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s;
  font-family:'Poppins',sans-serif;
  box-shadow:0 8px 25px rgba(46,204,113,0.35);
}
.btn-guest:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(46,204,113,0.5);
}
.back{
  display:inline-block;margin-top:20px;
  color:#bbb;font-size:13px;text-decoration:none;
  transition:color 0.3s;
}
.back:hover{color:#2ecc71;}
.privacy{
  margin-top:20px;padding:12px 15px;
  background:#f8fff8;border-radius:12px;
  font-size:11px;color:#aaa;
  border:1px solid #e8f5e9;line-height:1.6;
}
.error-msg{
  display:none;
  background:#ffe8e8;
  border:1px solid #ffb3b3;
  border-radius:10px;
  padding:10px 15px;
  margin-top:15px;
  font-size:13px;
  color:#cc0000;
}
@media(max-width:480px){
  .wrapper{padding:15px;}
  .card{padding:35px 25px;}
  .brand{font-size:24px;}
  .features{gap:8px;}
  .feat{padding:10px 3px;}
  .feat-icon{font-size:20px;}
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
</head>

<body>
<div class="leaf l1">🌿</div>
<div class="leaf l2">🍃</div>
<div class="leaf l3">🌱</div>
<div class="leaf l4">🍀</div>
<div class="leaf l5">🌾</div>
<div class="leaf l6">🌿</div>

<div class="wrapper">
  <div class="card">
    <div class="logo-wrap">🌿</div>
    <div class="brand">PlantCure AI</div>
    <div class="subtitle">Sign in to detect plant diseases instantly<br>using Artificial Intelligence</div>

    <div class="features">
      <div class="feat">
        <div class="feat-icon">🔬</div>
        <div class="feat-label">AI Analysis</div>
      </div>
      <div class="feat">
        <div class="feat-icon">💊</div>
        <div class="feat-label">Solutions</div>
      </div>
      <div class="feat">
        <div class="feat-icon">🌾</div>
        <div class="feat-label">38 Diseases</div>
      </div>
      <div class="feat">
        <div class="feat-icon">⚡</div>
        <div class="feat-label">3 Seconds</div>
      </div>
    </div>

    <button class="btn-google" onclick="googleLogin()" id="googleBtn">
      <svg class="google-svg" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="divider">or</div>

    <button class="btn-guest" onclick="window.location.href='/guest_login'">
      👤 Continue as Guest
    </button>

    <a href="/" class="back">← Back to Home</a>

    <div class="privacy">
      🔒 Secure login powered by Google Firebase.<br>
      We never share your data with third parties.
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAXDgFl19SsHUKmgyR2l77sBKPvF5MilQk",
  authDomain: "plantcure-ai.firebaseapp.com",
  projectId: "plantcure-ai",
  storageBucket: "plantcure-ai.firebasestorage.app",
  messagingSenderId: "161308453955",
  appId: "1:161308453955:web:5bbceab0adc3fb536238f6",
  measurementId: "G-Y2C5GBZBE1"
};

firebase.initializeApp(firebaseConfig);

function googleLogin() {
  const btn = document.getElementById('googleBtn');
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';

  btn.disabled = true;
  btn.innerHTML = '⏳ Signing in...';

  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({'prompt': 'select_account'});

  firebase.auth().signInWithPopup(provider)
    .then(result => {
      const user = result.user;
      btn.innerHTML = '✅ Logged in! Redirecting...';
      return fetch('/google_login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: user.displayName,
          email: user.email,
          photo: user.photoURL,
          uid: user.uid
        })
      });
    })
    .then(res => res.json())
    .then(data => {
      if(data.success){
        window.location.href = '/dashboard';
      }
    })
    .catch(err => {
      console.error('Login error:', err);
      btn.disabled = false;
      btn.innerHTML = `
        <svg class="google-svg" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google`;
      errorMsg.style.display = 'block';
      errorMsg.innerHTML = '❌ ' + (err.message || 'Login failed. Please try again!');
    });
}
</script>
</body>
</html>
